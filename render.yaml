services:
  - type: web
    name: houduan-api
    runtime: node
    plan: free
    repo: https://github.com/nikegongsi-afk/houduan
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        value: https://poqloztmhyznarxrpllr.supabase.co
      - key: Web_Trader_UUID
        value: ef59ab89-c338-4b64-a988-9a19446df14b
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MASSIVE_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
