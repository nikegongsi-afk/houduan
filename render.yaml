services:
  - type: web
    name: houduan-api
    runtime: node
    plan: free
    repo: https://github.com/nikegongsi-afk/houduan
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        value: https://poqloztmhyznarxrpllr.supabase.co
      - key: Web_Trader_UUID
        value: c5e01236-d681-4343-8386-f9e17748f81f
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
